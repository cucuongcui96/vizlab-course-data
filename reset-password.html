<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - VizLab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
        }
        .glass-panel { 
            background: rgba(2, 6, 23, 0.62); 
            backdrop-filter: blur(30px) saturate(150%); 
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(255,255,255,0.08); 
        }
        .input-glass {
            background: rgba(0, 0, 0, 0.40);
            border: 1px solid rgba(255,255,255,0.10);
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            background: rgba(255,255,255,0.055);
            border-color: #4fb9fd;
            box-shadow: 0 0 18px rgba(79,185,253,0.22);
        }
        .soft-orb {
            background:
                radial-gradient(circle at 30% 20%, rgba(79,185,253,.28), transparent 34%),
                radial-gradient(circle at 70% 70%, rgba(249,115,22,.18), transparent 36%),
                radial-gradient(circle at 50% 50%, rgba(139,92,246,.14), transparent 42%);
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center relative bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] bg-[#020617]">

    <div class="absolute inset-0 soft-orb opacity-80 pointer-events-none"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[680px] h-[680px] bg-[#4fb9fd]/10 rounded-full blur-[130px] pointer-events-none"></div>

    <div class="glass-panel w-[calc(100%-24px)] max-w-md p-7 sm:p-10 rounded-[2.2rem] z-10 shadow-[0_30px_80px_rgba(0,0,0,0.76)] relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-[#4fb9fd]/60 to-transparent"></div>

        <div class="text-center mb-8">
            <a href="https://hoc.vizlab3d.org/" class="inline-flex items-center justify-center mb-3 hover:scale-105 transition-transform duration-300">
                <img src="https://iili.io/B5sIBtt.png" alt="VizLab" class="h-12 w-auto object-contain">
            </a>
            <h1 class="text-white font-black text-2xl tracking-tight">Đặt lại mật khẩu</h1>
            <p class="text-slate-400 text-sm font-medium mt-1">Nhập mật khẩu mới cho tài khoản VizLab</p>
        </div>

        <div class="flex flex-col gap-4">
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 pl-1">Mật khẩu mới</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="password" id="newPassword" autocomplete="new-password" class="input-glass w-full rounded-xl py-3 pl-11 pr-12 text-sm text-white placeholder-slate-600 focus:outline-none" placeholder="Tối thiểu 6 ký tự">
                    <button type="button" onclick="togglePasswordVisibility('newPassword','new-eye')" class="absolute right-3 top-1/2 -translate-y-1/2 h-8 w-8 rounded-lg text-slate-500 hover:text-white hover:bg-white/10 transition-all">
                        <i id="new-eye" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 pl-1">Nhập lại mật khẩu</label>
                <div class="relative">
                    <i class="fas fa-shield-halved absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="password" id="confirmPassword" autocomplete="new-password" class="input-glass w-full rounded-xl py-3 pl-11 pr-12 text-sm text-white placeholder-slate-600 focus:outline-none" placeholder="Nhập lại mật khẩu mới">
                    <button type="button" onclick="togglePasswordVisibility('confirmPassword','confirm-eye')" class="absolute right-3 top-1/2 -translate-y-1/2 h-8 w-8 rounded-lg text-slate-500 hover:text-white hover:bg-white/10 transition-all">
                        <i id="confirm-eye" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div id="message" class="text-center text-xs font-semibold mt-1 hidden opacity-0 transition-opacity duration-300 min-h-[18px]"></div>

            <button id="update-btn" onclick="updatePassword()" class="w-full bg-gradient-to-r from-[#4fb9fd] to-blue-600 text-white font-black py-3 rounded-xl shadow-[0_0_20px_rgba(79,185,253,0.22)] hover:shadow-[0_0_30px_rgba(79,185,253,0.44)] hover:-translate-y-1 transition-all duration-300 flex items-center justify-center gap-2 text-sm">
                <i class="fas fa-key"></i> Cập nhật mật khẩu
            </button>
        </div>

        <div class="mt-8 text-center border-t border-white/5 pt-6">
            <a href="https://hoc.vizlab3d.org/login.html" class="text-xs text-slate-500 hover:text-[#4fb9fd] font-semibold transition-colors flex items-center justify-center gap-1.5">
                <i class="fas fa-arrow-left"></i> Quay lại đăng nhập
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://xxsledmpzvyzajiqpmwo.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_GNn61UbuKm6z1xm4LkEx7w_1UHVozJL";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const messageEl = document.getElementById("message");
        let recoverySessionReady = false;

        function setUpdateButtonState(disabled) {
            const btn = document.getElementById("update-btn");
            if (!btn) return;
            btn.disabled = disabled;
            btn.classList.toggle("opacity-60", disabled);
            btn.classList.toggle("cursor-not-allowed", disabled);
        }

        function cleanRecoveryUrl() {
            if (window.history && window.history.replaceState) {
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        async function initRecoverySession() {
            setUpdateButtonState(true);
            showMessage("Đang kiểm tra liên kết đặt lại mật khẩu...", "info");

            try {
                const params = new URLSearchParams(window.location.search);
                const code = params.get("code");

                // Supabase có thể trả về dạng ?code=... hoặc #access_token=...
                if (code) {
                    const { error } = await supabaseClient.auth.exchangeCodeForSession(code);
                    if (error) throw error;
                    cleanRecoveryUrl();
                }

                const { data, error } = await supabaseClient.auth.getSession();
                if (error) throw error;

                if (data && data.session) {
                    recoverySessionReady = true;
                    setUpdateButtonState(false);
                    showMessage("Liên kết hợp lệ. Bạn có thể nhập mật khẩu mới.", "success");
                } else {
                    recoverySessionReady = false;
                    setUpdateButtonState(true);
                    showMessage("Liên kết đặt lại mật khẩu chưa hợp lệ hoặc đã hết hạn. Hãy bấm Quên mật khẩu để nhận email mới.", "error");
                }
            } catch (error) {
                recoverySessionReady = false;
                setUpdateButtonState(true);
                showMessage("Không thể xác thực liên kết đặt lại mật khẩu: " + error.message, "error");
            }
        }

        function showMessage(text, type = "success") {
            messageEl.textContent = text;
            messageEl.classList.remove('hidden', 'opacity-0', 'text-red-400', 'text-emerald-400', 'text-[#4fb9fd]');
            if (type === "error") messageEl.classList.add('text-red-400', 'opacity-100');
            else if (type === "success") messageEl.classList.add('text-emerald-400', 'opacity-100');
            else messageEl.classList.add('text-[#4fb9fd]', 'opacity-100');
        }

        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            const isHidden = input.type === "password";
            input.type = isHidden ? "text" : "password";
            icon.classList.toggle("fa-eye", !isHidden);
            icon.classList.toggle("fa-eye-slash", isHidden);
        }

        async function updatePassword() {
            if (!recoverySessionReady) {
                return showMessage("Liên kết đặt lại mật khẩu chưa sẵn sàng. Hãy mở lại đúng link trong email hoặc gửi lại yêu cầu quên mật khẩu.", "error");
            }

            const newPassword = document.getElementById("newPassword").value.trim();
            const confirmPassword = document.getElementById("confirmPassword").value.trim();

            if (!newPassword || !confirmPassword) {
                return showMessage("Bạn cần nhập đầy đủ mật khẩu mới.", "error");
            }

            if (newPassword.length < 6) {
                return showMessage("Mật khẩu mới nên có ít nhất 6 ký tự.", "error");
            }

            if (newPassword !== confirmPassword) {
                return showMessage("Hai mật khẩu chưa trùng nhau.", "error");
            }

            showMessage("Đang cập nhật mật khẩu...", "info");

            const { error } = await supabaseClient.auth.updateUser({
                password: newPassword
            });

            if (error) {
                showMessage("Không thể cập nhật mật khẩu: " + error.message, "error");
            } else {
                showMessage("Cập nhật mật khẩu thành công! Đang chuyển về trang đăng nhập...", "success");
                setTimeout(async () => {
                    await supabaseClient.auth.signOut();
                    window.location.href = "https://hoc.vizlab3d.org/login.html";
                }, 1200);
            }
        }

        document.addEventListener("DOMContentLoaded", initRecoverySession);

        document.getElementById("confirmPassword").addEventListener("keypress", function(e) {
            if (e.key === "Enter") updatePassword();
        });
    </script>
</body>
</html>
