<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng Đăng Nhập - VizLab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
        }
        .glass-panel { 
            background: rgba(2, 6, 23, 0.62); 
            backdrop-filter: blur(30px) saturate(150%); 
            -webkit-backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid rgba(255,255,255,0.08); 
        }
        .input-glass {
            background: rgba(0, 0, 0, 0.40);
            border: 1px solid rgba(255,255,255,0.10);
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            background: rgba(255,255,255,0.055);
            border-color: #4fb9fd;
            box-shadow: 0 0 18px rgba(79,185,253,0.22);
        }
        .soft-orb {
            background:
                radial-gradient(circle at 30% 20%, rgba(79,185,253,.28), transparent 34%),
                radial-gradient(circle at 70% 70%, rgba(249,115,22,.18), transparent 36%),
                radial-gradient(circle at 50% 50%, rgba(139,92,246,.14), transparent 42%);
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center relative bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] bg-[#020617]">

    <div class="absolute inset-0 soft-orb opacity-80 pointer-events-none"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[680px] h-[680px] bg-[#4fb9fd]/10 rounded-full blur-[130px] pointer-events-none"></div>

    <div class="glass-panel w-[calc(100%-24px)] max-w-md p-7 sm:p-10 rounded-[2.2rem] z-10 shadow-[0_30px_80px_rgba(0,0,0,0.76)] relative overflow-hidden">

        <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-[#4fb9fd]/60 to-transparent"></div>
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-[#4fb9fd]/10 rounded-full blur-3xl pointer-events-none"></div>

        <div class="text-center mb-8">
            <a href="https://hoc.vizlab3d.org/" class="inline-flex items-center justify-center mb-3 hover:scale-105 transition-transform duration-300">
                <img src="https://iili.io/B5sIBtt.png" alt="VizLab" class="h-12 w-auto object-contain">
            </a>
            <h1 class="text-white font-black text-2xl tracking-tight">Đăng nhập VizLab</h1>
            <p id="auth-subtitle" class="text-slate-400 text-sm font-medium mt-1">Truy cập tài khoản để vào học và lưu khóa của bạn</p>
        </div>

        <div class="flex flex-col gap-4">

            <div id="name-field" class="hidden">
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 pl-1">Họ và tên</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="text" id="fullName" name="name" autocomplete="name" class="input-glass w-full rounded-xl py-3 pl-11 pr-4 text-sm text-white placeholder-slate-600 focus:outline-none" placeholder="Nhập họ tên khi tạo tài khoản">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 pl-1">Email</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="email" id="email" name="email" required autocomplete="email" class="input-glass w-full rounded-xl py-3 pl-11 pr-4 text-sm text-white placeholder-slate-600 focus:outline-none" placeholder="artist@example.com">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 pl-1">Mật khẩu</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="password" id="password" name="password" required autocomplete="current-password" class="input-glass w-full rounded-xl py-3 pl-11 pr-12 text-sm text-white placeholder-slate-600 focus:outline-none" placeholder="••••••••">
                    <button type="button" onclick="togglePasswordVisibility()" class="absolute right-3 top-1/2 -translate-y-1/2 h-8 w-8 rounded-lg text-slate-500 hover:text-white hover:bg-white/10 transition-all" aria-label="Hiện hoặc ẩn mật khẩu">
                        <i id="password-eye-icon" class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between gap-3 -mt-1">
                <label class="inline-flex items-center gap-2 cursor-pointer select-none">
                    <input type="checkbox" id="rememberEmail" class="h-4 w-4 rounded border-white/20 bg-black/40 accent-[#4fb9fd]">
                    <span class="text-xs text-slate-400 font-semibold">Ghi nhớ email</span>
                </label>
                <button type="button" onclick="handleForgotPassword()" class="text-xs font-black text-[#4fb9fd] hover:text-white transition-colors">
                    Quên mật khẩu?
                </button>
            </div>


            <div id="message" class="text-center text-xs font-semibold mt-1 hidden opacity-0 transition-opacity duration-300 min-h-[18px]"></div>

            <div class="flex flex-col sm:flex-row gap-3 mt-2">
                <button id="login-btn" onclick="handleLogin()" class="flex-1 bg-gradient-to-r from-[#4fb9fd] to-blue-600 text-white font-black py-3 rounded-xl shadow-[0_0_20px_rgba(79,185,253,0.22)] hover:shadow-[0_0_30px_rgba(79,185,253,0.44)] hover:-translate-y-1 transition-all duration-300 flex items-center justify-center gap-2 text-sm">
                    <i class="fas fa-sign-in-alt"></i> Đăng Nhập
                </button>
                <button id="signup-btn" onclick="handleSignup()" class="flex-1 bg-white/5 text-slate-300 font-bold py-3 rounded-xl border border-white/5 hover:bg-white/10 hover:text-white hover:border-white/10 hover:-translate-y-1 transition-all duration-300 text-sm">
                    Tạo Tài Khoản
                </button>
            </div>

            <button id="back-to-login-btn" type="button" onclick="setAuthMode('login')" class="hidden text-xs font-bold text-slate-500 hover:text-[#4fb9fd] transition-colors -mt-1">
                Đã có tài khoản? Quay lại đăng nhập
            </button>

        </div>

        <div class="mt-8 text-center border-t border-white/5 pt-6">
            <a href="https://hoc.vizlab3d.org/" class="text-xs text-slate-500 hover:text-[#4fb9fd] font-semibold transition-colors flex items-center justify-center gap-1.5">
                <i class="fas fa-arrow-left"></i> Trở về Khám phá
            </a>
        </div>
    </div>

   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://xxsledmpzvyzajiqpmwo.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_GNn61UbuKm6z1xm4LkEx7w_1UHVozJL";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const SITE_URL = "https://hoc.vizlab3d.org";
        const REMEMBER_EMAIL_KEY = "vizlab_remember_email";
        const messageEl = document.getElementById("message");
        let authMode = "login";

        function setAuthMode(mode) {
            authMode = mode;

            const isSignup = mode === "signup";
            const nameField = document.getElementById("name-field");
            const subtitle = document.getElementById("auth-subtitle");
            const loginBtn = document.getElementById("login-btn");
            const signupBtn = document.getElementById("signup-btn");
            const backBtn = document.getElementById("back-to-login-btn");
            const passwordInput = document.getElementById("password");

            nameField.classList.toggle("hidden", !isSignup);
            backBtn.classList.toggle("hidden", !isSignup);

            subtitle.textContent = isSignup
                ? "Tạo tài khoản học viên mới để bắt đầu học"
                : "Truy cập tài khoản để vào học và lưu khóa của bạn";

            passwordInput.setAttribute("autocomplete", isSignup ? "new-password" : "current-password");

            loginBtn.innerHTML = isSignup
                ? '<i class="fas fa-arrow-left"></i> Đăng Nhập'
                : '<i class="fas fa-sign-in-alt"></i> Đăng Nhập';

            signupBtn.innerHTML = isSignup
                ? '<i class="fas fa-user-plus"></i> Hoàn Tất Đăng Ký'
                : 'Tạo Tài Khoản';

            loginBtn.className = isSignup
                ? "flex-1 bg-white/5 text-slate-300 font-bold py-3 rounded-xl border border-white/5 hover:bg-white/10 hover:text-white hover:border-white/10 hover:-translate-y-1 transition-all duration-300 flex items-center justify-center gap-2 text-sm"
                : "flex-1 bg-gradient-to-r from-[#4fb9fd] to-blue-600 text-white font-black py-3 rounded-xl shadow-[0_0_20px_rgba(79,185,253,0.22)] hover:shadow-[0_0_30px_rgba(79,185,253,0.44)] hover:-translate-y-1 transition-all duration-300 flex items-center justify-center gap-2 text-sm";

            signupBtn.className = isSignup
                ? "flex-1 bg-gradient-to-r from-[#4fb9fd] to-blue-600 text-white font-black py-3 rounded-xl shadow-[0_0_20px_rgba(79,185,253,0.22)] hover:shadow-[0_0_30px_rgba(79,185,253,0.44)] hover:-translate-y-1 transition-all duration-300 text-sm flex items-center justify-center gap-2"
                : "flex-1 bg-white/5 text-slate-300 font-bold py-3 rounded-xl border border-white/5 hover:bg-white/10 hover:text-white hover:border-white/10 hover:-translate-y-1 transition-all duration-300 text-sm";

            if (!isSignup) {
                document.getElementById("fullName").value = "";
            }
        }

        function showMessage(text, type = "success") {
            messageEl.textContent = text;
            messageEl.classList.remove('hidden', 'opacity-0', 'text-red-400', 'text-emerald-400', 'text-[#4fb9fd]');

            if (type === "error") messageEl.classList.add('text-red-400', 'opacity-100');
            else if (type === "success") messageEl.classList.add('text-emerald-400', 'opacity-100');
            else messageEl.classList.add('text-[#4fb9fd]', 'opacity-100');
        }

        function getFormData() {
            const fullName = document.getElementById("fullName").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            return { fullName, email, password };
        }

        function returnToPreviousPage() {
            const ref = document.referrer || "";
            const fallbackUrl = SITE_URL + "/";

            // Không quay lại trang đặt lại mật khẩu hoặc trang đăng nhập,
            // tránh lỗi đăng nhập xong lại nhảy về form nhập mật khẩu mới.
            const isUnsafeReturn =
                ref.includes("reset-password.html") ||
                ref.includes("login.html") ||
                ref.includes("type=recovery") ||
                ref.includes("access_token=") ||
                ref.includes("refresh_token=");

            if (ref && !isUnsafeReturn && (ref.includes("vizlab3d.org") || ref.includes("github.io"))) {
                window.location.replace(ref);
            } else {
                window.location.replace(fallbackUrl);
            }
        }

        function saveRememberedEmail(email) {
            const rememberEmail = document.getElementById("rememberEmail").checked;
            if (rememberEmail && email) {
                localStorage.setItem(REMEMBER_EMAIL_KEY, email);
            } else {
                localStorage.removeItem(REMEMBER_EMAIL_KEY);
            }
        }

        function loadRememberedEmail() {
            const savedEmail = localStorage.getItem(REMEMBER_EMAIL_KEY);
            if (savedEmail) {
                document.getElementById("email").value = savedEmail;
                document.getElementById("rememberEmail").checked = true;
            }
        }

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById("password");
            const icon = document.getElementById("password-eye-icon");
            const isHidden = passwordInput.type === "password";

            passwordInput.type = isHidden ? "text" : "password";
            icon.classList.toggle("fa-eye", !isHidden);
            icon.classList.toggle("fa-eye-slash", isHidden);
        }

        async function handleLogin() {
            if (authMode === "signup") {
                setAuthMode("login");
                return;
            }

            const { email, password } = getFormData();
            if (!email || !password) {
                return showMessage("Bạn cần nhập email và mật khẩu.", "error");
            }

            showMessage("Đang kết nối trạm không gian...", "info");

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                showMessage("Đăng nhập thất bại: " + error.message, "error");
            } else if (data.user) {
                saveRememberedEmail(email);
                showMessage("Đăng nhập thành công! Đang trở lại vị trí cũ...", "success");
                setTimeout(() => { returnToPreviousPage(); }, 900);
            }
        }

        async function handleSignup() {
            if (authMode !== "signup") {
                setAuthMode("signup");
                showMessage("Nhập họ tên để tạo tài khoản mới.", "info");
                document.getElementById("fullName").focus();
                return;
            }

            const { fullName, email, password } = getFormData();

            if (!fullName) {
                return showMessage("Bạn cần nhập họ và tên khi tạo tài khoản.", "error");
            }
            if (!email || !password) {
                return showMessage("Bạn cần nhập email và mật khẩu để đăng ký.", "error");
            }
            if (password.length < 6) {
                return showMessage("Mật khẩu nên có ít nhất 6 ký tự.", "error");
            }

            showMessage("Đang tạo tài khoản...", "info");

            const { data, error } = await supabaseClient.auth.signUp({
                email,
                password,
                options: {
                    emailRedirectTo: SITE_URL + "/login.html",
                    data: {
                        full_name: fullName || email.split('@')[0]
                    }
                }
            });

            if (error) {
                showMessage("Đăng ký lỗi: " + error.message, "error");
                return;
            }

            if (data.user) {
                saveRememberedEmail(email);

                // Không để lỗi ghi profile làm hỏng quá trình đăng ký.
                // Supabase Auth vẫn là nguồn chính để tạo tài khoản.
                try {
                    await supabaseClient.from("profiles").upsert({
                        id: data.user.id,
                        email: email,
                        full_name: fullName || email.split('@')[0]
                    }, { onConflict: "id" });
                } catch (profileError) {
                    console.warn("Không ghi được profile, nhưng tài khoản Auth vẫn đã được tạo:", profileError);
                }

                if (data.session) {
                    showMessage("Đăng ký thành công! Đang đưa bạn về trang học...", "success");
                    setTimeout(() => { returnToPreviousPage(); }, 1000);
                } else {
                    showMessage("Đăng ký thành công! Bạn hãy kiểm tra email để xác nhận tài khoản trước khi đăng nhập.", "success");
                    setAuthMode("login");
                }
            } else {
                showMessage("Đăng ký thành công! Bạn hãy kiểm tra email để xác nhận tài khoản.", "success");
                setAuthMode("login");
            }
        }

        async function handleForgotPassword() {
            const email = document.getElementById("email").value.trim();

            if (!email) {
                showMessage("Bạn hãy nhập email trước, sau đó bấm Quên mật khẩu.", "error");
                document.getElementById("email").focus();
                return;
            }

            showMessage("Đang gửi email đặt lại mật khẩu...", "info");

            const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: SITE_URL + "/reset-password.html"
            });

            if (error) {
                showMessage("Không gửi được email đặt lại mật khẩu: " + error.message, "error");
            } else {
                localStorage.setItem(REMEMBER_EMAIL_KEY, email);
                showMessage("Đã gửi email đặt lại mật khẩu. Bạn hãy kiểm tra hộp thư hoặc mục spam.", "success");
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            loadRememberedEmail();
            setAuthMode("login");

            const params = new URLSearchParams(window.location.search);
            if (params.get("password_updated") === "1") {
                showMessage("Mật khẩu đã được cập nhật. Bạn có thể đăng nhập bằng mật khẩu mới.", "success");
                if (window.history && window.history.replaceState) {
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            }
        });

        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
