<!DOCTYPE html>

<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập học viên - Vizlab</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 0;
    }

    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 26px;
    }

    .desc {
      color: #666;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      font-size: 14px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      margin-bottom: 16px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .login-btn {
      background: #111827;
      color: white;
    }

    .signup-btn {
      background: #e5e7eb;
      color: #111827;
    }

    .message {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .success {
      color: #15803d;
    }

    .error {
      color: #b91c1c;
    }

    .back-link {
      display: inline-block;
      margin-top: 18px;
      color: #2563eb;
      text-decoration: none;
      font-size: 14px;
    }
  </style>

</head>

<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1>Đăng nhập học viên</h1>
      <p class="desc">
        Đăng nhập để xem các khóa học đã mua và tiếp tục học trên Vizlab.
      </p>

```
  <label for="fullName">Họ tên</label>
  <input id="fullName" type="text" placeholder="Nhập họ tên của bạn">

  <label for="email">Email</label>
  <input id="email" type="email" placeholder="Nhập email">

  <label for="password">Mật khẩu</label>
  <input id="password" type="password" placeholder="Nhập mật khẩu">

  <button class="login-btn" onclick="handleLogin()">
    Đăng nhập
  </button>

  <button class="signup-btn" onclick="handleSignup()">
    Đăng ký tài khoản mới
  </button>

  <div id="message" class="message"></div>

  <a class="back-link" href="https://cucuongcui96.github.io/vizlab-course-data/vizlab-course-data/index.html">
    ← Quay lại danh sách khóa học
  </a>
</div>
```

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="supabase-config.js"></script>

  <script src="auth.js"></script>

  <script>
    const HOME_URL = "https://cucuongcui96.github.io/vizlab-course-data/vizlab-course-data/index.html";

    const messageEl = document.getElementById("message");

    function showMessage(text, type = "success") {
      messageEl.textContent = text;
      messageEl.className = "message " + type;
    }

    function getFormData() {
      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      return { fullName, email, password };
    }

    async function handleLogin() {
      const { email, password } = getFormData();

      if (!email || !password) {
        showMessage("Bạn cần nhập email và mật khẩu.", "error");
        return;
      }

      const user = await signIn(email, password);

      if (user) {
        showMessage("Đăng nhập thành công. Đang chuyển về trang khóa học...", "success");

        setTimeout(() => {
          window.location.href = HOME_URL;
        }, 800);
      }
    }

    async function handleSignup() {
      const { fullName, email, password } = getFormData();

      if (!email || !password) {
        showMessage("Bạn cần nhập email và mật khẩu để đăng ký.", "error");
        return;
      }

      if (password.length < 6) {
        showMessage("Mật khẩu nên có ít nhất 6 ký tự.", "error");
        return;
      }

      const user = await signUp(email, password, fullName);

      if (user) {
        showMessage("Đăng ký thành công. Nếu hệ thống yêu cầu xác nhận email, bạn hãy kiểm tra email rồi quay lại đăng nhập.", "success");
      }
    }
  </script>

</body>
</html>
