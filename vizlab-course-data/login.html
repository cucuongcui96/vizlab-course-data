<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng Đăng Nhập - VizLab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden;
        }
        .glass-panel { 
            background: rgba(2, 6, 23, 0.55); 
            backdrop-filter: blur(30px) saturate(150%); 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        .input-glass {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        .input-glass:focus {
            background: rgba(255,255,255,0.05);
            border-color: #4fb9fd;
            box-shadow: 0 0 15px rgba(79,185,253,0.2);
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center relative bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] bg-[#020617]">

    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-[#4fb9fd]/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="glass-panel w-full max-w-md p-10 rounded-[2.5rem] z-10 shadow-[0_30px_60px_rgba(0,0,0,0.7)] relative overflow-hidden">
        
        <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-[#4fb9fd]/50 to-transparent"></div>

        <div class="text-center mb-8">
            <a href="https://cucuongcui96.github.io/vizlab-course-data/vizlab-course-data/index.html" class="inline-flex items-center gap-2 text-3xl font-black tracking-tighter text-white mb-2 hover:scale-105 transition-transform duration-300">
                <i class="fas fa-cube text-[#4fb9fd]"></i> Viz<span class="text-orange-500">Lab</span>
            </a>
            <p class="text-slate-400 text-sm font-medium">Hệ sinh thái dành riêng cho 3D Artist</p>
        </div>

        <div class="flex flex-col gap-4">
            
            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 pl-1">Họ và tên</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="text" id="fullName" class="input-glass w-full rounded-xl py-3 pl-11 pr-4 text-sm text-white placeholder-slate-600 focus:outline-none" placeholder="Nhập tên (Cần thiết khi đăng ký)">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 pl-1">Email</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="email" id="email" required class="input-glass w-full rounded-xl py-3 pl-11 pr-4 text-sm text-white placeholder-slate-600 focus:outline-none" placeholder="artist@example.com">
                </div>
            </div>

            <div>
                <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5 pl-1">Mật khẩu</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="password" id="password" required class="input-glass w-full rounded-xl py-3 pl-11 pr-4 text-sm text-white placeholder-slate-600 focus:outline-none" placeholder="••••••••">
                </div>
            </div>

            <div id="message" class="text-center text-xs font-semibold mt-1 hidden opacity-0 transition-opacity duration-300 min-h-[16px]"></div>

            <div class="flex flex-col sm:flex-row gap-3 mt-4">
                <button onclick="handleLogin()" class="flex-1 bg-gradient-to-r from-[#4fb9fd] to-blue-600 text-white font-black py-3 rounded-xl shadow-[0_0_20px_rgba(79,185,253,0.2)] hover:shadow-[0_0_30px_rgba(79,185,253,0.4)] hover:-translate-y-1 transition-all duration-300 flex items-center justify-center gap-2 text-sm">
                    <i class="fas fa-sign-in-alt"></i> Đăng Nhập
                </button>
                <button onclick="handleSignup()" class="flex-1 bg-white/5 text-slate-300 font-bold py-3 rounded-xl border border-white/5 hover:bg-white/10 hover:text-white hover:border-white/10 hover:-translate-y-1 transition-all duration-300 text-sm">
                    Tạo Tài Khoản
                </button>
            </div>
            
        </div>

        <div class="mt-8 text-center border-t border-white/5 pt-6">
            <a href="https://cucuongcui96.github.io/vizlab-course-data/vizlab-course-data/index.html" class="text-xs text-slate-500 hover:text-[#4fb9fd] font-semibold transition-colors flex items-center justify-center gap-1.5">
                <i class="fas fa-arrow-left"></i> Trở về Khám phá
            </a>
        </div>
    </div>

   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://xxsledmpzvyzajiqpmwo.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_GNn61UbuKm6z1xm4LkEx7w_1UHVozJL";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const messageEl = document.getElementById("message");

        function showMessage(text, type = "success") {
            messageEl.textContent = text;
            messageEl.classList.remove('hidden', 'opacity-0', 'text-red-400', 'text-emerald-400', 'text-[#4fb9fd]');
            
            if (type === "error") messageEl.classList.add('text-red-400', 'opacity-100');
            else if (type === "success") messageEl.classList.add('text-emerald-400', 'opacity-100');
            else messageEl.classList.add('text-[#4fb9fd]', 'opacity-100');
        }

        function getFormData() {
            const fullName = document.getElementById("fullName").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            return { fullName, email, password };
        }

       // 🌟 THUẬT TOÁN TÌM ĐƯỜNG VỀ THÔNG MINH (Hỗ trợ cả lúc Test lẫn Chạy Thật)
        function returnToPreviousPage() {
            const ref = document.referrer;
            
            // Cho phép quay về nếu trang cũ là web thật HOẶC là link Github đang test
            if (ref && (ref.includes("vizlab3d.org") || ref.includes("github.io"))) {
                window.location.href = ref;
            } else {
                // Nếu không có trí nhớ, mặc định văng về trang chủ chứa khóa học
                window.location.href = "https://cucuongcui96.github.io/vizlab-course-data/vizlab-course-data/index.html";
            }
        }

        async function handleLogin() {
            const { email, password } = getFormData();
            if (!email || !password) {
                return showMessage("Bạn cần nhập email và mật khẩu.", "error");
            }

            showMessage("Đang kết nối trạm không gian...", "info");
            
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                showMessage("Đăng nhập thất bại: " + error.message, "error");
            } else if (data.user) {
                showMessage("Đăng nhập thành công! Đang trở lại vị trí cũ...", "success");
                
                // Gọi thuật toán quay về sau 1 giây
                setTimeout(() => { returnToPreviousPage(); }, 1000);
            }
        }

        async function handleSignup() {
            const { fullName, email, password } = getFormData();
            
            if (!email || !password) {
                return showMessage("Bạn cần nhập email và mật khẩu để đăng ký.", "error");
            }
            if (password.length < 6) {
                return showMessage("Mật khẩu nên có ít nhất 6 ký tự.", "error");
            }

            showMessage("Đang tạo tài khoản...", "info");

            const { data, error } = await supabaseClient.auth.signUp({ email, password });

            if (error) {
                showMessage("Đăng ký lỗi: " + error.message, "error");
            } else if (data.user) {
                await supabaseClient.from("profiles").insert({
                    id: data.user.id,
                    email: email,
                    full_name: fullName || email.split('@')[0]
                });
                showMessage("Đăng ký thành công! Hãy kiểm tra email để xác nhận (nếu có).", "success");
            }
        }

        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
